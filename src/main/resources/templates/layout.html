<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo} + ' | HUEVOS DKS'">HUEVOS DKS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
</head>
<body>

<nav class="navbar navbar-dark bg-warning">
    <div class="container">
        <a class="navbar-brand fw-bold text-dark" href="/">🥚 HUEVOS DKS</a>
        <div sec:authorize="isAuthenticated()">
            <span class="text-dark me-3"
                  th:text="${#authentication.name}">Usuario</span>
            <a href="/logout" class="btn btn-sm btn-dark">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <div th:replace="${contenido}">
        <!-- El contenido de cada página va aquí -->
    </div>
</main>

<footer class="text-center text-muted mt-5 mb-3">
    <small>HUEVOS DKS &copy; 2025 — SENA Ficha 2910871</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
