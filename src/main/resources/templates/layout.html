<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title th:text="${titulo} + ' | HUEVOS DKS'">HUEVOS DKS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        :root {
            --dks-azul-oscuro: #1B3A6B;
            --dks-azul-claro:  #4AB3E8;
            --dks-amarillo:    #F5C842;
            --dks-crema:       #F5F0E8;
        }
        body { background-color: var(--dks-crema); }
        .navbar-dks {
            background-color: var(--dks-azul-oscuro);
        }
        .navbar-dks .navbar-brand span {
            color: var(--dks-amarillo);
            font-weight: 700;
        }
        .btn-dks {
            background-color: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            font-weight: 600;
            border: none;
        }
        .btn-dks:hover {
            background-color: var(--dks-azul-claro);
            color: white;
        }
        .logo-navbar {
            height: 40px;
            width: auto;
            object-fit: contain;
        }
        @media (max-width: 576px) {
            .logo-navbar { height: 32px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dks">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <img src="/img/logo-huevos-dks.png"
                 alt="HUEVOS DKS"
                 class="logo-navbar"/>
            <span>HUEVOS DKS</span>
        </a>
        <div class="ms-auto d-flex align-items-center gap-3"
             sec:authorize="isAuthenticated()">
            <span class="text-white small"
                  th:text="${#authentication.name}">Usuario</span>
            <a href="/logout" class="btn btn-dks btn-sm">Salir</a>
        </div>
    </div>
</nav>

<main class="container mt-4">
    <div th:replace="${contenido}">
        <!-- El contenido de cada pagina va aqui -->
    </div>
</main>

<footer class="text-center mt-5 mb-3" style="color: var(--dks-azul-oscuro);">
    <small>HUEVOS DKS &copy; 2025 &mdash; SENA Ficha 2910871</small>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
