<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Nuevo operador | HUEVOS DKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        :root {
            --dks-azul-oscuro: #1b3a6b;
            --dks-azul-claro: #4ab3e8;
            --dks-amarillo: #f5c842;
            --dks-crema: #f5f0e8;
        }

        body {
            background-color: var(--dks-crema);
        }

        .navbar-dks {
            background-color: var(--dks-azul-oscuro);
        }

        .navbar-brand span {
            color: var(--dks-amarillo);
            font-weight: 800;
        }

        .logo-navbar {
            height: 42px;
            width: auto;
            object-fit: contain;
        }

        .titulo-seccion {
            color: var(--dks-azul-oscuro);
            font-weight: 800;
        }

        .card-admin {
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        }

        .btn-dks {
            background-color: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            border: none;
            font-weight: 700;
        }

        .btn-dks:hover {
            background-color: var(--dks-azul-claro);
            color: #ffffff;
        }

        .btn-outline-dks {
            border: 1px solid var(--dks-azul-oscuro);
            color: var(--dks-azul-oscuro);
            font-weight: 600;
        }

        .btn-outline-dks:hover {
            background-color: var(--dks-azul-oscuro);
            color: #ffffff;
        }

        .error-campo {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <section class="mb-4">
        <h2 class="titulo-seccion mb-1">Crear operador</h2>
        <p class="text-muted mb-0">
            Los operadores solo pueden ser creados por un administrador.
        </p>
    </section>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        Error
    </div>

    <section class="card card-admin">
        <div class="card-body">
            <form th:action="@{/admin/usuarios/nuevo-operador}"
                  th:object="${operadorForm}"
                  method="post">

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label for="nombre" class="form-label fw-semibold">Nombre completo</label>
                        <input type="text"
                               id="nombre"
                               th:field="*{nombre}"
                               class="form-control"
                               placeholder="Nombre del operador">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}">
                            Error nombre
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="telefono" class="form-label fw-semibold">Teléfono</label>
                        <input type="text"
                               id="telefono"
                               th:field="*{telefono}"
                               class="form-control"
                               placeholder="3000000000"
                               maxlength="10">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('telefono')}"
                             th:errors="*{telefono}">
                            Error teléfono
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="contrasenia" class="form-label fw-semibold">Contraseña</label>
                        <input type="password"
                               id="contrasenia"
                               th:field="*{contrasenia}"
                               class="form-control"
                               placeholder="Mínimo 6 caracteres">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('contrasenia')}"
                             th:errors="*{contrasenia}">
                            Error contraseña
                        </div>
                    </div>

                    <div class="col-12 col-md-6 d-flex align-items-end">
                        <div class="form-check">
                            <input type="checkbox"
                                   id="activo"
                                   th:field="*{activo}"
                                   class="form-check-input">
                            <label for="activo" class="form-check-label">
                                Operador activo
                            </label>
                        </div>
                    </div>
                </div>

                <hr>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dks">
                        Crear operador
                    </button>

                    <a href="/admin/usuarios" class="btn btn-outline-dks">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
