<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1"/>
    <title>Dashboard | HUEVOS DKS</title>
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"/>
    <style>
        body { background-color: #F5F0E8; }
    </style>
</head>
<body>
<nav class="navbar" style="background-color: #1B3A6B;">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/">
            <img src="/img/logo-huevos-dks.png" alt="HUEVOS DKS"
                 style="height:40px; width:auto;"/>
            <span style="color:#F5C842; font-weight:700;">HUEVOS DKS</span>
        </a>
        <a href="/logout" class="btn btn-sm"
           style="background-color:#F5C842; color:#1B3A6B; font-weight:600;">
            Salir
        </a>
    </div>
</nav>

<div class="container mt-5 text-center">
    <h2 style="color:#1B3A6B;">Bienvenido</h2>
    <p class="text-muted">Has iniciado sesion correctamente.</p>
    <p>Usuario: <strong sec:authentication="name">-</strong></p>
    <p>Rol: <strong sec:authentication="principal.authorities">-</strong></p>
</div>
</body>
</html>
