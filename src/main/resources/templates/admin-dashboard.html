<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Panel administrador | HUEVOS DKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        :root {
            --dks-azul-oscuro: #1b3a6b;
            --dks-azul-claro: #4ab3e8;
            --dks-amarillo: #f5c842;
            --dks-crema: #f5f0e8;
        }

        body {
            background-color: var(--dks-crema);
        }

        .navbar-dks {
            background-color: var(--dks-azul-oscuro);
        }

        .navbar-brand span {
            color: var(--dks-amarillo);
            font-weight: 800;
        }

        .logo-navbar {
            height: 42px;
            width: auto;
            object-fit: contain;
        }

        .titulo-seccion {
            color: var(--dks-azul-oscuro);
            font-weight: 800;
        }

        .card-admin {
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        }

        .btn-dks {
            background-color: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            border: none;
            font-weight: 700;
        }

        .btn-dks:hover {
            background-color: var(--dks-azul-claro);
            color: #ffffff;
        }

        .icono-panel {
            font-size: 46px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dks">
    <div class="container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="/admin">
            <img src="/img/logo-huevos-dks.png"
                 alt="HUEVOS DKS"
                 class="logo-navbar">
            <span>HUEVOS DKS | Admin</span>
        </a>

        <div class="ms-auto d-flex align-items-center gap-3">
            <span class="text-white small d-none d-md-inline">
                Admin:
                <strong sec:authentication="name">usuario</strong>
            </span>

            <form th:action="@{/logout}" method="post" class="m-0">
                <button type="submit" class="btn btn-outline-light btn-sm">
                    Salir
                </button>
            </form>
        </div>
    </div>
</nav>

<main class="container py-4">

    <section class="mb-4">
        <h2 class="titulo-seccion mb-1">Panel administrador</h2>
        <p class="text-muted mb-0">
            Gestiona pedidos, productos e inventario del sistema.
        </p>
    </section>

    <section class="row g-4">
        <div class="col-12 col-md-6">
            <div class="card card-admin h-100">
                <div class="card-body text-center p-4">
                    <div class="icono-panel mb-3">📦</div>
                    <h4 class="fw-bold">Pedidos</h4>
                    <p class="text-muted">
                        Consulta pedidos, filtra por estado y cambia su avance.
                    </p>
                    <a href="/admin/pedidos" class="btn btn-dks">
                        Gestionar pedidos
                    </a>
                </div>
            </div>
        </div>

        <div class="col-12 col-md-6">
            <div class="card card-admin h-100">
                <div class="card-body text-center p-4">
                    <div class="icono-panel mb-3">🥚</div>
                    <h4 class="fw-bold">Productos e inventario</h4>
                    <p class="text-muted">
                        Crea productos, edita precios y ajusta inventario.
                    </p>
                    <a href="/admin/productos" class="btn btn-dks">
                        Gestionar productos
                    </a>
                </div>
            </div>
        </div>
    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
