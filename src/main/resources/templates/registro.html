<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Registro | HUEVOS DKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        :root {
            --dks-azul-oscuro: #1b3a6b;
            --dks-azul-claro: #4ab3e8;
            --dks-amarillo: #f5c842;
            --dks-crema: #f5f0e8;
        }

        body {
            background: var(--dks-crema);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .registro-card {
            max-width: 520px;
            width: 100%;
            border-radius: 18px;
            border: none;
            box-shadow: 0 6px 24px rgba(0, 0, 0, 0.12);
        }

        .titulo-dks {
            color: var(--dks-azul-oscuro);
            font-weight: 800;
        }

        .subtitulo-dks {
            color: #6c757d;
            font-size: 0.95rem;
        }

        .btn-dks {
            background: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            font-weight: 700;
            border: none;
            padding: 10px;
        }

        .btn-dks:hover {
            background: var(--dks-azul-claro);
            color: #ffffff;
        }

        .error-campo {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 4px;
        }

        .link-dks {
            color: var(--dks-azul-oscuro);
            font-weight: 600;
            text-decoration: none;
        }

        .link-dks:hover {
            color: var(--dks-azul-claro);
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div class="card registro-card p-4">
    <div class="text-center mb-4">
        <h4 class="titulo-dks mb-1">Crear cuenta</h4>
        <p class="subtitulo-dks mb-0">
            Regístrate para hacer pedidos en HUEVOS DKS.
        </p>
    </div>

    <div th:if="${error}" class="alert alert-danger text-center py-2" th:text="${error}">
        Error en el registro
    </div>

    <form th:action="@{/registro}" th:object="${registroDTO}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

        <div class="mb-3">
            <label for="nombre" class="form-label">Nombre completo</label>
            <input type="text"
                   id="nombre"
                   th:field="*{nombre}"
                   class="form-control"
                   placeholder="Ej: Alexander Cifuentes">
            <div class="error-campo"
                 th:if="${#fields.hasErrors('nombre')}"
                 th:errors="*{nombre}">
                Error nombre
            </div>
        </div>

        <div class="mb-3">
            <label for="telefono" class="form-label">Teléfono</label>
            <input type="text"
                   id="telefono"
                   th:field="*{telefono}"
                   class="form-control"
                   placeholder="Ej: 3001234567">
            <div class="error-campo"
                 th:if="${#fields.hasErrors('telefono')}"
                 th:errors="*{telefono}">
                Error teléfono
            </div>
        </div>

        <div class="mb-3">
            <label for="direccion" class="form-label">Dirección</label>
            <input type="text"
                   id="direccion"
                   th:field="*{direccion}"
                   class="form-control"
                   placeholder="Ej: Calle 10 # 20 - 30">
            <div class="error-campo"
                 th:if="${#fields.hasErrors('direccion')}"
                 th:errors="*{direccion}">
                Error dirección
            </div>
        </div>

        <div class="mb-3">
            <label for="barrio" class="form-label">Barrio</label>
            <input type="text"
                   id="barrio"
                   th:field="*{barrio}"
                   class="form-control"
                   placeholder="Ej: El Tintal">
            <div class="error-campo"
                 th:if="${#fields.hasErrors('barrio')}"
                 th:errors="*{barrio}">
                Error barrio
            </div>
        </div>

        <div class="mb-3">
            <label for="password" class="form-label">Contraseña</label>
            <input type="password"
                   id="password"
                   th:field="*{password}"
                   class="form-control"
                   placeholder="Mínimo 6 caracteres">
            <div class="error-campo"
                 th:if="${#fields.hasErrors('password')}"
                 th:errors="*{password}">
                Error contraseña
            </div>
        </div>

        <div class="mb-4">
            <label for="confirmarPassword" class="form-label">Confirmar contraseña</label>
            <input type="password"
                   id="confirmarPassword"
                   th:field="*{confirmarPassword}"
                   class="form-control"
                   placeholder="Repite la contraseña">
            <div class="error-campo"
                 th:if="${#fields.hasErrors('confirmarPassword')}"
                 th:errors="*{confirmarPassword}">
                Error confirmación
            </div>
        </div>

        <button type="submit" class="btn btn-dks w-100">
            Registrarme
        </button>
    </form>

    <div class="text-center mt-3">
        <a href="/login" class="link-dks">
            Ya tengo cuenta, iniciar sesión
        </a>
    </div>
</div>

</body>
</html>
