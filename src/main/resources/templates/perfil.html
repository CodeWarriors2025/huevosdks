<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Mi perfil | HUEVOS DKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        :root {
            --dks-azul-oscuro: #1b3a6b;
            --dks-azul-claro: #4ab3e8;
            --dks-amarillo: #f5c842;
            --dks-crema: #f5f0e8;
        }

        body {
            background-color: var(--dks-crema);
        }

        .navbar-dks {
            background-color: var(--dks-azul-oscuro);
        }

        .navbar-brand span {
            color: var(--dks-amarillo);
            font-weight: 800;
        }

        .logo-navbar {
            height: 42px;
            width: auto;
            object-fit: contain;
        }

        .titulo-seccion {
            color: var(--dks-azul-oscuro);
            font-weight: 800;
        }

        .card-perfil {
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        }

        .btn-dks {
            background-color: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            border: none;
            font-weight: 700;
        }

        .btn-dks:hover {
            background-color: var(--dks-azul-claro);
            color: #ffffff;
        }

        .btn-outline-dks {
            border: 1px solid var(--dks-azul-oscuro);
            color: var(--dks-azul-oscuro);
            font-weight: 600;
        }

        .btn-outline-dks:hover {
            background-color: var(--dks-azul-oscuro);
            color: #ffffff;
        }

        .error-campo {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <section class="mb-4">
        <h2 class="titulo-seccion mb-1">Mi perfil</h2>
        <p class="text-muted mb-0">
            Consulta y actualiza tus datos básicos.
        </p>
    </section>

    <div th:if="${mensaje}" class="alert alert-success" th:text="${mensaje}">
        Mensaje exitoso
    </div>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        Error
    </div>

    <section class="card card-perfil">
        <div class="card-body">
            <form th:action="@{/perfil}"
                  th:object="${perfil}"
                  method="post">

                <div class="row g-3">
                    <div class="col-12 col-md-6">
                        <label for="nombre" class="form-label fw-semibold">Nombre</label>
                        <input type="text"
                               id="nombre"
                               th:field="*{nombre}"
                               class="form-control">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}">
                            Error nombre
                        </div>
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="telefono" class="form-label fw-semibold">Teléfono</label>
                        <input type="text"
                               id="telefono"
                               th:field="*{telefono}"
                               class="form-control"
                               readonly>
                    </div>

                    <div class="col-12 col-md-3">
                        <label for="rol" class="form-label fw-semibold">Rol</label>
                        <input type="text"
                               id="rol"
                               th:field="*{rol}"
                               class="form-control"
                               readonly>
                    </div>

                    <input type="hidden" th:field="*{cliente}">

                    <div th:if="${perfil.cliente}" class="col-12">
                        <hr>
                        <h5 class="fw-bold">Datos de entrega</h5>
                        <p class="text-muted mb-0">
                            Estos datos se usarán para la dirección de tus próximos pedidos.
                        </p>
                    </div>

                    <div th:if="${perfil.cliente}" class="col-12 col-md-4">
                        <label for="direccion" class="form-label fw-semibold">Dirección</label>
                        <input type="text"
                               id="direccion"
                               th:field="*{direccion}"
                               class="form-control"
                               placeholder="Ej: Calle 10 # 20 - 30">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('direccion')}"
                             th:errors="*{direccion}">
                            Error dirección
                        </div>
                    </div>

                    <div th:if="${perfil.cliente}" class="col-12 col-md-4">
                        <label for="barrio" class="form-label fw-semibold">Barrio</label>
                        <input type="text"
                               id="barrio"
                               th:field="*{barrio}"
                               class="form-control"
                               placeholder="Barrio">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('barrio')}"
                             th:errors="*{barrio}">
                            Error barrio
                        </div>
                    </div>

                    <div th:if="${perfil.cliente}" class="col-12 col-md-4">
                        <label for="localidad" class="form-label fw-semibold">Localidad</label>
                        <select id="localidad"
                                th:field="*{localidad}"
                                class="form-select">
                            <option value="">Seleccione una localidad</option>
                            <option value="Usaquén">Usaquén</option>
                            <option value="Chapinero">Chapinero</option>
                            <option value="Santa Fe">Santa Fe</option>
                            <option value="San Cristóbal">San Cristóbal</option>
                            <option value="Usme">Usme</option>
                            <option value="Tunjuelito">Tunjuelito</option>
                            <option value="Bosa">Bosa</option>
                            <option value="Kennedy">Kennedy</option>
                            <option value="Fontibón">Fontibón</option>
                            <option value="Engativá">Engativá</option>
                            <option value="Suba">Suba</option>
                            <option value="Barrios Unidos">Barrios Unidos</option>
                            <option value="Teusaquillo">Teusaquillo</option>
                            <option value="Los Mártires">Los Mártires</option>
                            <option value="Antonio Nariño">Antonio Nariño</option>
                            <option value="Puente Aranda">Puente Aranda</option>
                            <option value="La Candelaria">La Candelaria</option>
                            <option value="Rafael Uribe Uribe">Rafael Uribe Uribe</option>
                            <option value="Ciudad Bolívar">Ciudad Bolívar</option>
                            <option value="Sumapaz">Sumapaz</option>
                        </select>
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('localidad')}"
                             th:errors="*{localidad}">
                            Error localidad
                        </div>
                    </div>
                </div>

                <hr>

                <div class="d-flex gap-2">
                    <button type="submit" class="btn btn-dks">
                        Guardar cambios
                    </button>

                    <a href="/" class="btn btn-outline-dks">
                        Volver
                    </a>
                </div>
            </form>
        </div>
    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
