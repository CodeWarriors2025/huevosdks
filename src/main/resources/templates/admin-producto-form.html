<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Formulario producto | HUEVOS DKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        :root {
            --dks-azul-oscuro: #1b3a6b;
            --dks-azul-claro: #4ab3e8;
            --dks-amarillo: #f5c842;
            --dks-crema: #f5f0e8;
        }

        body {
            background-color: var(--dks-crema);
        }

        .navbar-dks {
            background-color: var(--dks-azul-oscuro);
        }

        .navbar-brand span {
            color: var(--dks-amarillo);
            font-weight: 800;
        }

        .nav-link:hover {
            color: var(--dks-amarillo) !important;
        }

        .logo-navbar {
            height: 42px;
            width: auto;
            object-fit: contain;
        }

        .titulo-seccion {
            color: var(--dks-azul-oscuro);
            font-weight: 800;
        }

        .card-admin {
            border: none;
            border-radius: 18px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.10);
        }

        .btn-dks {
            background-color: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            border: none;
            font-weight: 700;
        }

        .btn-dks:hover {
            background-color: var(--dks-azul-claro);
            color: #ffffff;
        }

        .btn-outline-dks {
            border: 1px solid var(--dks-azul-oscuro);
            color: var(--dks-azul-oscuro);
            font-weight: 600;
        }

        .btn-outline-dks:hover {
            background-color: var(--dks-azul-oscuro);
            color: #ffffff;
        }

        .error-campo {
            color: #dc3545;
            font-size: 0.85rem;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container py-4">

    <section class="mb-4">
        <h2 class="titulo-seccion mb-1"
            th:text="${modo == 'EDITAR'} ? 'Editar producto' : 'Crear producto'">
            Crear producto
        </h2>

        <p class="text-muted mb-0">
            Registra o actualiza la información comercial del producto y su inventario disponible.
        </p>
    </section>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}">
        Error
    </div>

    <section class="card card-admin">
        <div class="card-body">
            <form th:action="${modo == 'EDITAR'} ? @{/admin/productos/{id}/editar(id=${productoId})} : @{/admin/productos/nuevo}"
                  th:object="${productoForm}"
                  method="post">

                <div class="row g-3">

                    <div class="col-12 col-md-6">
                        <label for="nombre" class="form-label fw-semibold">
                            Nombre
                        </label>
                        <input type="text"
                               id="nombre"
                               th:field="*{nombre}"
                               class="form-control"
                               placeholder="Ej: Cubeta de huevos AA">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('nombre')}"
                             th:errors="*{nombre}">
                            Error nombre
                        </div>
                    </div>

                    <div class="col-12 col-md-6">
                        <label for="tipo" class="form-label fw-semibold">
                            Tipo
                        </label>
                        <select id="tipo"
                                th:field="*{tipo}"
                                class="form-select">
                            <option value="">Seleccione un tipo</option>
                            <option th:each="tipoItem : ${tipos}"
                                    th:value="${tipoItem.name()}"
                                    th:text="${tipoItem.name()}">
                                CUBETA
                            </option>
                        </select>
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('tipo')}"
                             th:errors="*{tipo}">
                            Error tipo
                        </div>
                    </div>

                    <div class="col-12">
                        <label for="descripcion" class="form-label fw-semibold">
                            Descripción
                        </label>
                        <textarea id="descripcion"
                                  th:field="*{descripcion}"
                                  class="form-control"
                                  rows="3"
                                  placeholder="Descripción corta del producto"></textarea>
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('descripcion')}"
                             th:errors="*{descripcion}">
                            Error descripción
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="precioUnitario" class="form-label fw-semibold">
                            Precio unitario
                        </label>
                        <input type="number"
                               id="precioUnitario"
                               th:field="*{precioUnitario}"
                               class="form-control"
                               min="0"
                               step="100"
                               placeholder="18000">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('precioUnitario')}"
                             th:errors="*{precioUnitario}">
                            Error precio
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="unidadesPorPresentacion" class="form-label fw-semibold">
                            Unidades por presentación
                        </label>
                        <input type="number"
                               id="unidadesPorPresentacion"
                               th:field="*{unidadesPorPresentacion}"
                               class="form-control"
                               min="1"
                               placeholder="30">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('unidadesPorPresentacion')}"
                             th:errors="*{unidadesPorPresentacion}">
                            Error unidades
                        </div>
                    </div>

                    <div class="col-12 col-md-4">
                        <label for="cantidadDisponible" class="form-label fw-semibold">
                            Inventario disponible
                        </label>
                        <input type="number"
                               id="cantidadDisponible"
                               th:field="*{cantidadDisponible}"
                               class="form-control"
                               min="0"
                               placeholder="10">
                        <div class="error-campo"
                             th:if="${#fields.hasErrors('cantidadDisponible')}"
                             th:errors="*{cantidadDisponible}">
                            Error inventario
                        </div>
                    </div>

                    <div class="col-12">
                        <div class="form-check">
                            <input type="checkbox"
                                   id="activo"
                                   th:field="*{activo}"
                                   class="form-check-input">
                            <label for="activo" class="form-check-label">
                                Producto activo y visible para clientes
                            </label>
                        </div>
                    </div>
                </div>

                <hr>

                <div class="d-flex gap-2 flex-wrap">
                    <button type="submit" class="btn btn-dks">
                        Guardar producto
                    </button>

                    <a href="/admin/productos" class="btn btn-outline-dks">
                        Cancelar
                    </a>

                    <a href="/admin" class="btn btn-outline-secondary">
                        Volver al panel
                    </a>
                </div>
            </form>
        </div>
    </section>

</main>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
