<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Acceso denegado | HUEVOS DKS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

    <style>
        :root {
            --dks-azul-oscuro: #1b3a6b;
            --dks-azul-claro: #4ab3e8;
            --dks-amarillo: #f5c842;
            --dks-crema: #f5f0e8;
        }

        body {
            background-color: var(--dks-crema);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }

        .card-error {
            border: none;
            border-radius: 22px;
            box-shadow: 0 4px 18px rgba(0, 0, 0, 0.12);
        }

        .codigo-error {
            color: var(--dks-azul-oscuro);
            font-size: 4rem;
            font-weight: 900;
        }

        .titulo {
            color: var(--dks-azul-oscuro);
            font-weight: 800;
        }

        .btn-dks {
            background-color: var(--dks-amarillo);
            color: var(--dks-azul-oscuro);
            border: none;
            font-weight: 700;
        }

        .btn-dks:hover {
            background-color: var(--dks-azul-claro);
            color: #ffffff;
        }
    </style>
</head>
<body>

<main class="container">
    <section class="row justify-content-center">
        <div class="col-12 col-md-8 col-lg-6">
            <div class="card card-error">
                <div class="card-body text-center p-5">
                    <div class="codigo-error">403</div>

                    <h1 class="titulo mb-3">Acceso denegado</h1>

                    <p class="text-muted mb-4">
                        No tienes permisos para ingresar a esta sección del sistema.
                    </p>

                    <a href="/" class="btn btn-dks">
                        Volver al inicio
                    </a>
                </div>
            </div>
        </div>
    </section>
</main>

</body>
</html>
